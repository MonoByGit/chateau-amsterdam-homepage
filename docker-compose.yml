services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chateau_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - chateau_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chateau_dev"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  chateau_pg_data:
